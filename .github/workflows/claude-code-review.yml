name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  code-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          direct_prompt: |
            Review this pull request focusing on:
            - Correctness of TODO completions in exercise files
            - Code quality and adherence to best practices
            - Potential bugs, edge cases, or security issues
            - Test coverage and meaningful assertions
            - Docker/CI-CD configuration validity (if applicable)
            Provide concise, constructive feedback as PR review comments.
